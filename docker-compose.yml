services:
  db:
    image: mysql:8.0
    container_name: pms-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - pms-db-data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pms-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pms-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST:              db
      DB_USER:              ${DB_USER}
      DB_PASSWORD:          ${DB_PASSWORD}
      DB_NAME:              ${DB_NAME}
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY}
      CRM_BASE_URL:         ${CRM_BASE_URL}
      CRM_SYNC_TOKEN:       ${CRM_SYNC_TOKEN}
      CRM_POLL_INTERVAL:    ${CRM_POLL_INTERVAL:-60}
      ENABLE_CRM_POLLING:   ${ENABLE_CRM_POLLING:-true}
      CORS_ORIGINS:         ${CORS_ORIGINS}
      FLASK_ENV:            production
    expose:
      - "5000"
    networks:
      - pms-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - pms-net

volumes:
  pms-db-data:

networks:
  pms-net:
    driver: bridge
